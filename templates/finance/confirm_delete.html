{% extends "finance/base.html" %}
{% block title %}Confirm Delete — Money Manager{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}
{% block content %}
<div class="max-w-md">
  <div class="card border-red-900/40">
    <p class="text-zinc-300 mb-6">
      Delete <strong class="text-zinc-100">{{ object }}</strong>? This cannot be undone.
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="flex gap-3">
        <button type="submit" class="btn-danger">Delete</button>
        <a href="javascript:history.back()" class="btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
